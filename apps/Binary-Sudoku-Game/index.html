<!DOCTYPE html>
<html>
<head>
<title>Binary Sudoku</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Binary Sudoku</h1>

<button id="rules-btn">Show Rules</button>

<div id="rules" class="rules">
<h3>Game Rules</h3>
<ul>
<li>Each row must contain equal number of 0s and 1s.</li>
<li>Each column must contain equal number of 0s and 1s.</li>
<li>No more than two identical numbers together.</li>
<li>No two rows can be the same.</li>
<li>No two columns can be the same.</li>
</ul>
</div>

<div class="controls">

<label>Size:</label>
<select id="size-select">
<option value="4">4 x 4</option>
<option value="6" selected>6 x 6</option>
<option value="8">8 x 8</option>
</select>

<label>Difficulty:</label>
<select id="difficulty-select">
<option value="easy">Easy</option>
<option value="medium" selected>Medium</option>
<option value="hard">Hard</option>
</select>

<button id="new-game">New Game</button>

</div>

<h3>⏱ Time: <span id="timer">0</span> sec</h3>

<div id="game-board"></div>

<div class="buttons">
<button id="check-btn">Check Solution</button>
<button id="reset-btn">Reset</button>
<button id="show-solution">Show Solution</button>
</div>

<p id="message"></p>

<script src="script.js"></script>

</body>
</html>
